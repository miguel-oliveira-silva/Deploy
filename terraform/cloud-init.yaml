#cloud-config
# =============================================================================
# cloud-init.yaml — Provisionamento automático da VM no primeiro boot
# =============================================================================
# O Azure injeta este arquivo na VM via "custom_data". O cloud-init é um
# padrão de mercado (suportado pela maioria das imagens Linux) que executa
# tarefas de configuração assim que a VM liga pela primeira vez — sem
# precisarmos entrar manualmente via SSH para instalar nada.
#
# O QUE ESTE SCRIPT FAZ, EM ORDEM:
#   1. Atualiza pacotes do sistema operacional (Ubuntu)
#   2. Instala dependências (git, curl, etc.)
#   3. Instala o Docker Engine + Docker Compose plugin
#   4. Clona o repositório do projeto
#   5. Gera o arquivo .env com as credenciais vindas do Terraform
#   6. Sobe toda a stack com "docker compose up -d --build"
#   7. Registra um log de execução em /var/log/markovitz-bootstrap.log
# =============================================================================

package_update: true
package_upgrade: true

packages:
  - git
  - curl
  - ca-certificates
  - gnupg
  - apt-transport-https

write_files:
  # ---------------------------------------------------------------------------
  # Script principal de bootstrap — feito como write_files + runcmd para
  # facilitar depuração: se algo falhar, dá pra rodar o script manualmente
  # de novo via SSH (sudo bash /opt/markovitz/bootstrap.sh).
  # ---------------------------------------------------------------------------
  - path: /opt/markovitz/bootstrap.sh
    permissions: '0755'
    content: |
      #!/bin/bash
      set -euo pipefail
      exec > >(tee -a /var/log/markovitz-bootstrap.log) 2>&1

      echo "============================================================"
      echo "[markovitz] Iniciando bootstrap em $(date)"
      echo "============================================================"

      # -----------------------------------------------------------------
      # 1) INSTALAÇÃO DO DOCKER ENGINE + COMPOSE PLUGIN
      # -----------------------------------------------------------------
      if ! command -v docker &> /dev/null; then
        echo "[markovitz] Instalando Docker..."
        install -m 0755 -d /etc/apt/keyrings
        curl -fsSL https://download.docker.com/linux/ubuntu/gpg -o /etc/apt/keyrings/docker.asc
        chmod a+r /etc/apt/keyrings/docker.asc

        echo \
          "deb [arch=$(dpkg --print-architecture) signed-by=/etc/apt/keyrings/docker.asc] https://download.docker.com/linux/ubuntu \
          $(. /etc/os-release && echo "$VERSION_CODENAME") stable" | \
          tee /etc/apt/sources.list.d/docker.list > /dev/null

        apt-get update -y
        apt-get install -y docker-ce docker-ce-cli containerd.io docker-buildx-plugin docker-compose-plugin

        systemctl enable docker
        systemctl start docker

        # Permite que o usuário admin rode "docker" sem sudo
        usermod -aG docker ${admin_username}
        echo "[markovitz] Docker instalado com sucesso."
      else
        echo "[markovitz] Docker já instalado, pulando."
      fi

      # -----------------------------------------------------------------
      # 2) CLONE DO REPOSITÓRIO
      # -----------------------------------------------------------------
      REPO_DIR="/opt/markovitz/app"

      if [ ! -d "$REPO_DIR/.git" ]; then
        echo "[markovitz] Clonando repositório ${git_repo_url} (branch ${git_repo_branch})..."
        rm -rf "$REPO_DIR"
        git clone --branch "${git_repo_branch}" --depth 1 "${git_repo_url}" "$REPO_DIR"
      else
        echo "[markovitz] Repositório já existe, atualizando (git pull)..."
        cd "$REPO_DIR"
        git fetch origin "${git_repo_branch}"
        git reset --hard "origin/${git_repo_branch}"
      fi

      cd "$REPO_DIR"

      # -----------------------------------------------------------------
      # 3) ARQUIVO .env COM AS CREDENCIAIS (geradas pelo Terraform)
      # -----------------------------------------------------------------
      echo "[markovitz] Gerando arquivo .env..."
      cat > "$REPO_DIR/.env" <<EOF
      DB_USER=${db_user}
      DB_PASSWORD=${db_password}
      RABBITMQ_USER=${rabbitmq_user}
      RABBITMQ_PASSWORD=${rabbitmq_password}
      RISK_FREE_RATE=0.1075
      EOF
      chmod 600 "$REPO_DIR/.env"

      # -----------------------------------------------------------------
      # 4) SOBE A STACK COMPLETA
      # -----------------------------------------------------------------
      echo "[markovitz] Subindo containers com docker compose..."
      docker compose -f "$REPO_DIR/docker-compose.yml" up -d --build

      echo "============================================================"
      echo "[markovitz] Bootstrap concluído em $(date)"
      echo "============================================================"
      docker compose -f "$REPO_DIR/docker-compose.yml" ps

  # ---------------------------------------------------------------------------
  # Serviço systemd que roda o bootstrap no boot e também permite re-executar
  # facilmente (ex: depois de um "systemctl restart markovitz-bootstrap").
  # ---------------------------------------------------------------------------
  - path: /etc/systemd/system/markovitz-bootstrap.service
    permissions: '0644'
    content: |
      [Unit]
      Description=Markovitz - Bootstrap da aplicacao (clone + docker compose up)
      After=network-online.target docker.service
      Wants=network-online.target

      [Service]
      Type=oneshot
      ExecStart=/opt/markovitz/bootstrap.sh
      RemainAfterExit=true
      TimeoutStartSec=900

      [Install]
      WantedBy=multi-user.target

runcmd:
  - mkdir -p /opt/markovitz
  - systemctl daemon-reload
  - systemctl enable markovitz-bootstrap.service
  - systemctl start markovitz-bootstrap.service

final_message: "Markovitz: cloud-init finalizado em $UPTIME segundos. Veja /var/log/markovitz-bootstrap.log para detalhes do deploy da aplicação."
